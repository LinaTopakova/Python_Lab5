repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v6.0.0"
    hooks:
      - id: check-added-large-files
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.25
    hooks:
      - id: validate-pyproject

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: "0.11.2"
    hooks:
      - id: uv-lock
        name: check uv lock file consistency
        args: ["--locked"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff-check
        args: [--fix, --unsafe-fixes, --show-fixes]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy-check
        name: Check types with mypy
        language: system
        entry: uv run mypy
        types: [python]
        require_serial: true
        pass_filenames: true

      - id: commitizen
        name: Check commit messages with Commitizen
        language: system
        entry: uv run cz check
        args: [--allow-abort, --commit-msg-file]
        stages: [commit-msg]

      - id: no-print-statements
        name: Forbid print() statements
        language: pygrep
        entry: print\(
        types: [python]
